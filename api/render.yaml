services:
  # PostgreSQL Database
  - type: pserv
    name: cb5-postgres
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile.postgres
    dockerContext: .
    disk:
      name: cb5-postgres-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 1
    envVars:
      - key: POSTGRES_USER
        value: postgres
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: cb5_db

  # Express API Service
  - type: web
    name: cb5-backend
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: STAGING_URL
        value: https://cb5-api.onrender.com
      - key: POSTGRES_USER
        value: postgres
      - key: POSTGRES_PASSWORD
        fromService:
          type: pserv
          name: cb5-postgres
          envVarKey: POSTGRES_PASSWORD
      - key: POSTGRES_DB
        value: cb5_db
      - key: POSTGRES_HOST
        fromService:
          type: pserv
          name: cb5-postgres
          property: host
      - key: POSTGRES_PORT
        fromService:
          type: pserv
          name: cb5-postgres
          property: port
      - key: DATABASE_URL
        fromDatabase:
          name: cb5-postgres
          property: connectionString
